name: Release

concurrency:
  group: nativeaot-release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            ext: tar.gz
          - os: windows-2025
            rid: win-x64
            ext: zip
          - os: windows-11-arm
            rid: win-arm64
            ext: zip
          - os: macos-26
            rid: osx-arm64
            ext: tar.gz
          - os: macos-26-intel
            rid: osx-x64
            ext: tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          mkdir -p "$artifact_dir"
          dotnet publish scenario2cast.cs -c Release -r "${{ matrix.rid }}" --self-contained true -p:PublishAot=true -p:StripSymbols=true -p:DebugType=None -o "$artifact_dir"

      - name: Smoke test published binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          binary_name="scenario2cast"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            binary_name="scenario2cast.exe"
          fi

          binary_path="$artifact_dir/$binary_name"
          output_path="$artifact_dir/smoke.cast"

          test -f "$binary_path"

          "$binary_path" examples/basic.yaml "$output_path"

          test -f "$output_path"

      - name: Package release assets
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          archive_base_name="scenario2cast-${{ github.ref_name }}-${{ matrix.rid }}"
          archive_path="$GITHUB_WORKSPACE/${archive_base_name}.${{ matrix.ext }}"
          checksum_path="$archive_path.sha256"

          if [[ "${{ matrix.ext }}" == "zip" ]]; then
            cd "$artifact_dir"
            zip -r "$archive_path" .
            cd "$GITHUB_WORKSPACE"
          else
            tar -czf "$archive_path" -C "$artifact_dir" .
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            checksum_value=$(sha256sum "$archive_path" | awk '{print $1}')
          else
            checksum_value=$(shasum -a 256 "$archive_path" | awk '{print $1}')
          fi

          printf '%s  %s\n' "$checksum_value" "$(basename "$archive_path")" > "$checksum_path"

          test -f "$archive_path"
          test -f "$checksum_path"

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.rid }}
          path: |
            ${{ github.workspace }}/scenario2cast-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}
            ${{ github.workspace }}/scenario2cast-${{ github.ref_name }}-${{ matrix.rid }}.${{ matrix.ext }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts/ -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;

          echo "### Release assets" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find release/ -maxdepth 1 -type f | sort | xargs -n 1 basename >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "$TAG" release/* --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
