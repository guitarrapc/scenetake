name: Build

concurrency:
  group: nativeaot-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Publish ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${{ matrix.rid }}"
          mkdir -p "$artifact_dir"
          dotnet publish scenario2cast.cs -c Release -r "${{ matrix.rid }}" --self-contained true -p:PublishAot=true -p:StripSymbols=true -p:DebugType=None -o "$artifact_dir"

      - name: Smoke test published binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${{ matrix.rid }}"
          binary_name="scenario2cast"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            binary_name="scenario2cast.exe"
          fi

          binary_path="$artifact_dir/$binary_name"
          output_stem="$artifact_dir/smoke"

          test -f "$binary_path"

          "$binary_path" --format svg samples/basic.yaml "$output_stem"

          test -f "$output_stem.cast"
          test -f "$output_stem.svg"

          "$binary_path" svg "$output_stem.cast" "$artifact_dir/smoke-from-cast.svg"

          test -f "$artifact_dir/smoke-from-cast.svg"

          "$binary_path" svg samples/highlight.cast "$artifact_dir/highlight.svg"

          test -f "$artifact_dir/highlight.svg"

          for fixture in tests/fixtures/*.cast; do
            stem="$(basename "$fixture" .cast)"
            "$binary_path" svg "$fixture" "$artifact_dir/fixture-$stem.svg"
            test -f "$artifact_dir/fixture-$stem.svg"
          done

          dotnet run tests/terminal_tests.cs
          dotnet run tests/svg_render_test.cs
          dotnet run tests/window_chrome_test.cs
