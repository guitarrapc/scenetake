name: Build

concurrency:
  group: nativeaot-build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Publish ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-2025
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-26
            rid: osx-arm64
          - os: macos-26-intel
            rid: osx-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${{ matrix.rid }}"
          mkdir -p "$artifact_dir"
          dotnet publish scenetake.cs -c Release -r "${{ matrix.rid }}" --self-contained true -p:PublishAot=true -p:StripSymbols=true -p:DebugType=None -o "$artifact_dir"

      - name: Install matrix CLI
        shell: bash
        run: |
          matrix_version="v1.0.1"
          matrix_dir="$RUNNER_TEMP/matrix"
          mkdir -p "$matrix_dir"
          case "${{ matrix.rid }}" in
            win-x64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.zip" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-win-amd64.zip"
              unzip -o "$RUNNER_TEMP/matrix.zip" -d "$matrix_dir"
              ;;
            win-arm64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.zip" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-win-arm64.zip"
              unzip -o "$RUNNER_TEMP/matrix.zip" -d "$matrix_dir"
              ;;
            linux-x64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.tar.gz" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-linux-amd64.tar.gz"
              tar -xzf "$RUNNER_TEMP/matrix.tar.gz" -C "$matrix_dir"
              ;;
            linux-arm64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.tar.gz" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-linux-arm64.tar.gz"
              tar -xzf "$RUNNER_TEMP/matrix.tar.gz" -C "$matrix_dir"
              ;;
            osx-x64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.tar.gz" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-osx-amd64.tar.gz"
              tar -xzf "$RUNNER_TEMP/matrix.tar.gz" -C "$matrix_dir"
              ;;
            osx-arm64)
              curl -fsSL -o "$RUNNER_TEMP/matrix.tar.gz" "https://github.com/guitarrapc/matrix/releases/download/${matrix_version}/matrix-osx-arm64.tar.gz"
              tar -xzf "$RUNNER_TEMP/matrix.tar.gz" -C "$matrix_dir"
              ;;
          esac
          echo "$matrix_dir" >> "$GITHUB_PATH"

      - name: Smoke test published binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifacts/${{ matrix.rid }}"
          binary_name="scenetake"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            binary_name="scenetake.exe"
          fi

          binary_path="$artifact_dir/$binary_name"
          output_stem="$artifact_dir/smoke"

          test -f "$binary_path"

          "$binary_path" --format svg samples/basic.yaml "$output_stem"

          test -f "$output_stem.cast"
          test -f "$output_stem.svg"

          "$binary_path" svg "$output_stem.cast" "$artifact_dir/smoke-from-cast.svg"

          test -f "$artifact_dir/smoke-from-cast.svg"

          "$binary_path" svg samples/highlight.cast "$artifact_dir/highlight.svg"

          test -f "$artifact_dir/highlight.svg"

          for fixture in tests/fixtures/*.cast; do
            stem="$(basename "$fixture" .cast)"
            "$binary_path" svg "$fixture" "$artifact_dir/fixture-$stem.svg"
            test -f "$artifact_dir/fixture-$stem.svg"
          done

          dotnet run tests/terminal_tests.cs
          dotnet run tests/json_escape_test.cs
          SCENETAKE_BIN="$binary_path" dotnet run tests/pty_test.cs
          dotnet run tests/readme_sync_test.cs
          dotnet run tests/svg_render_test.cs
          dotnet run tests/window_chrome_test.cs
