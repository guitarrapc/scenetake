name: Release

concurrency:
  group: nativeaot-release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

jobs:
  prepare-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ github.ref_name }}"
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --verify-tag --draft
          fi

  publish:
    name: Publish ${{ matrix.os }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            archive: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive: tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          mkdir -p "$artifact_dir"
          dotnet publish scenario2cast.cs -c Release -r "${{ matrix.rid }}" --self-contained true -p:PublishAot=true -p:StripSymbols=true -p:DebugType=None -o "$artifact_dir"

      - name: Smoke test published binary
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          binary_name="scenario2cast"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            binary_name="scenario2cast.exe"
          fi

          binary_path="$artifact_dir/$binary_name"
          output_path="$artifact_dir/smoke.cast"

          test -f "$binary_path"

          "$binary_path" examples/basic.yaml "$output_path"

          test -f "$output_path"

      - name: Package release assets
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/release/${{ matrix.rid }}"
          archive_base_name="scenario2cast-${{ github.ref_name }}-${{ matrix.rid }}"
          archive_path="$GITHUB_WORKSPACE/${archive_base_name}.tar.gz"
          checksum_path="$archive_path.sha256"

          tar -czf "$archive_path" -C "$artifact_dir" .

          if command -v sha256sum >/dev/null 2>&1; then
            checksum_value=$(sha256sum "$archive_path" | awk '{print $1}')
          else
            checksum_value=$(shasum -a 256 "$archive_path" | awk '{print $1}')
          fi

          printf '%s  %s\n' "$checksum_value" "$(basename "$archive_path")" > "$checksum_path"

          test -f "$archive_path"
          test -f "$checksum_path"

      - name: Upload release assets
        shell: bash
        run: |
          archive_base_name="scenario2cast-${{ github.ref_name }}-${{ matrix.rid }}"
          archive_path="$GITHUB_WORKSPACE/${archive_base_name}.tar.gz"
          checksum_path="$archive_path.sha256"

          gh release upload "${{ github.ref_name }}" "$archive_path" "$checksum_path" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
