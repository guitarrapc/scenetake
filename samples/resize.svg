<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="829.6" height="264" viewBox="0 0 829.6 264" preserveAspectRatio="xMidYMid meet" role="img" aria-label="scenetake output">
<style>
text { font-family: ui-monospace, "Cascadia Mono", "Cascadia Code", "JetBrains Mono", "Noto Sans Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 16px; white-space: pre; }
text { dominant-baseline: alphabetic; }
.bg { shape-rendering: crispEdges; }
.layer { opacity: 0; }
.cursor-block { fill: #d0d0d0; fill-opacity: 0.5; }
@keyframes k0 { 0%,100%{opacity:1;} }
@keyframes k1 { 0%,54.5%{opacity:0;} 54.545%,100%{opacity:1;} }
@keyframes k2 { 0%,99.955%{opacity:0;} 100%,100%{opacity:1;} }
@keyframes k3 { 0%,54.545%{opacity:1;} 54.636%,100%{opacity:0;} }
@keyframes k4 { 0%,54.5%{opacity:0;} 54.545%,100%{opacity:1;} 100%,100%{opacity:0;} }
.layer-0 { animation:k0 1.1s linear infinite; }
.layer-1 { animation:k1 1.1s linear infinite; }
.layer-2 { animation:k2 1.1s linear infinite; }
.layer-3 { animation:k2 1.1s linear infinite; }
.cursor-layer-0 { animation:k3 1.1s linear infinite; }
.cursor-layer-1 { animation:k4 1.1s linear infinite; }
.cursor-layer-2 { animation:k2 1.1s linear infinite; }
.viewport-mask-0,.viewport-bg-0 { animation:k3 1.1s linear infinite; }
.viewport-mask-1,.viewport-bg-1 { animation:k4 1.1s linear infinite; }
.viewport-mask-2,.viewport-bg-2 { animation:k2 1.1s linear infinite; }
</style>
<defs>
<mask id="viewport-mask" x="0" y="0" width="829.6" height="264" maskUnits="userSpaceOnUse">
<rect class="layer viewport-mask-0" x="8" y="8" width="416.8" height="168" fill="white"/>
<rect class="layer viewport-mask-1" x="8" y="8" width="813.6" height="248" fill="white"/>
<rect class="layer viewport-mask-2" x="8" y="8" width="516" height="128" fill="white"/>
</mask>
</defs>
<g mask="url(#viewport-mask)">
<rect class="bg layer viewport-bg-0" x="8" y="8" width="416.8" height="168" fill="#282c34"/>
<rect class="bg layer viewport-bg-1" x="8" y="8" width="813.6" height="248" fill="#282c34"/>
<rect class="bg layer viewport-bg-2" x="8" y="8" width="516" height="128" fill="#282c34"/>
<g class="layer layer-0">
<text x="18" y="24.8" fill="#d0d0d0" font-weight="normal" textLength="208.32" lengthAdjust="spacing">Small terminal (40x8)</text>
</g>
<g class="layer layer-1">
<text x="226.32" y="44.8" fill="#d0d0d0" font-weight="normal" textLength="168.64" lengthAdjust="spacing">Expanded to 80x12</text>
</g>
<g class="layer layer-2">
<text x="394.96" y="64.8" fill="#d0d0d0" font-weight="normal" textLength="119.04" lengthAdjust="spacing">Shrunk to 50</text>
</g>
<g class="layer layer-3">
<text x="18" y="84.8" fill="#d0d0d0" font-weight="normal" textLength="19.84" lengthAdjust="spacing">x6</text>
</g>
<g class="layer cursor-layer-0">
<rect class="cursor-block" x="226.32" y="32" width="9.92" height="20"/>
</g>
<g class="layer cursor-layer-1">
<rect class="cursor-block" x="394.96" y="52" width="9.92" height="20"/>
</g>
<g class="layer cursor-layer-2">
<rect class="cursor-block" x="37.84" y="92" width="9.92" height="20"/>
</g>
</g>
</svg>
