title: "Highlight Demo"
width: 80
height: 24
shell: bash

steps:
  - name: comment color is cyan
    run: echo hello
  - name: "[yellow] comment color override"
    run: echo world
  - name: run & stdout color default
    run: date
  - name: run color override
    run: date
    run-highlight: "bold underline green"
  - name: stdout color override
    run: printf 'line1 alpha\nline2 beta gamma\nline3\n'
    highlight:
      - color: red
        at: "1:7-"
      - color: green
        at: "2:7-10"
      - color: magenta
        at: "2:11-"
      - color: underline fg:bright-white bg:blue
        at: "3"
  - name: stderr color default is red
    run: echo "this is error" 1>&2
  - name: stderr color override
    run: echo "this is error" 1>&2
    stderr-color: bright-yellow
  - name: stderr style override with SGR literal
    run: echo "stderr style literal" 1>&2
    stderr-color: "\\e[1;93m"
