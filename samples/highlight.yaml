title: "Highlight Demo"
width: 80
height: 20
shell: bash
settings:
  stderr-color: red

steps:
  - run: printf 'line1 alpha\nline2 beta gamma\nline3\n'
    highlight:
      - color: red
        at: "1:7-"
      - color: green
        at: "2:7-10"
      - color: blue
        at: "2-3"
  - name: default cyan comment
    run: echo hello
  - name: "[yellow] attention comment"
    run: echo world
  - run: echo "plain stderr sample" 1>&2
  - run: echo "plain stderr sample override color" 1>&2
    stderr-color: bright-yellow
  - run: date
    run-highlight: bright-magenta
